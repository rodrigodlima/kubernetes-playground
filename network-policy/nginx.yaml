apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: netpol-demo
  labels:
    app: nginx
    role: backend
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: netpol-demo
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
