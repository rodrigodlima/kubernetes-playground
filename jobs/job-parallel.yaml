apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-workers
  namespace: jobs-demo
spec:
  completions: 6
  parallelism: 3
  backoffLimit: 2
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - echo "Worker $HOSTNAME starting"; sleep 5; echo "Worker $HOSTNAME done"
