apiVersion: batch/v1
kind: Job
metadata:
  name: failing
  namespace: jobs-demo
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: failing
          image: busybox:1.36
          command: ["sh", "-c", "echo Attempt; sleep 2; exit 1"]
