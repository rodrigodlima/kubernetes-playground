apiVersion: batch/v1
kind: Job
metadata:
  name: hello
  namespace: jobs-demo
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: hello
          image: busybox:1.36
          command: ["sh", "-c", "echo Hello from Job; sleep 5; echo Done"]
